services:
  db:
    image: postgres:16-alpine
    container_name: bolna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bolna_alerts
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - bolna_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    container_name: bolna-app
    restart: unless-stopped
    env_file: .env
    environment:
      # Inside docker network, app talks to db service directly on 5432
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/bolna_alerts
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  bolna_pgdata:
